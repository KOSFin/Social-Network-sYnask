name: synask-frontend-prod

services:
  quality-gate:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../..:/app
    env_file:
      - ../../.env.prod
    environment:
      API_HEALTHCHECK_URL: ${API_HEALTHCHECK_URL:-}
    command: ["sh", "-c", "node ./scripts/deploy-preflight.mjs"]

  frontend:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    env_file:
      - ../../.env.prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      quality-gate:
        condition: service_completed_successfully
    restart: unless-stopped
